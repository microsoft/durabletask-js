name: 🚀 Test and Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-unit-tests:
    runs-on: ubuntu-latest

    env:
      NODE_VER: 22.x

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: ⚙️ NodeJS - Install
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VER }}
          registry-url: "https://registry.npmjs.org"

      - name: ⚙️ Install dependencies
        run: npm ci

      - name: 🔍 Run linting
        run: npm run lint

      - name: ✅ Run unit tests
        run: npm run test:unit

  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]
    needs: lint-and-unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: ⚙️ NodeJS - Install
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"

      - name: ⚙️ Install dependencies
        run: npm ci

      # Install Go SDK for durabletask-go sidecar
      - name: 🔧 Install Go SDK
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "stable"

      # Install and run the durabletask-go sidecar for running e2e tests
      - name: ✅ Run E2E tests with durabletask-go sidecar
        run: |
          go install github.com/microsoft/durabletask-go@main
          durabletask-go --port 4001 &
          sleep 5  # Wait for sidecar to be ready
          npm run test:e2e:internal
